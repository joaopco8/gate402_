name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/server/package-lock.json

      - name: Install server deps
        run: cd apps/server && npm ci

      - name: Run unit tests
        run: cd apps/server && npm test

  e2e:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install selenium webdriver-manager pytest python-dotenv

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Create .env.test
        run: |
          mkdir -p tests/e2e
          printf 'GATE402_EMAIL=%s\nGATE402_PASSWORD=%s\nGATE402_URL=https://www.gate402.dev\n' \
            '${{ secrets.GATE402_EMAIL }}' \
            '${{ secrets.GATE402_PASSWORD }}' \
            > tests/e2e/.env.test

      - name: Run E2E tests (except logout)
        env:
          PYTHONIOENCODING: utf-8
          CI: true
        run: |
          python -m pytest tests/e2e/ \
            --ignore=tests/e2e/test_z_logout.py \
            -v -s --tb=short

      - name: Run logout test
        env:
          PYTHONIOENCODING: utf-8
          CI: true
        run: |
          python -m pytest tests/e2e/test_z_logout.py \
            -v -s --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
