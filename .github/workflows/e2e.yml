name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test server
        working-directory: apps/server
        env:
          TEST_PRO_API_KEY: ${{ secrets.TEST_PRO_API_KEY }}
          TEST_FREE_API_KEY: ${{ secrets.TEST_FREE_API_KEY }}
        run: npm install --ignore-scripts && npm test

      - name: Test SDK
        working-directory: packages/sdk
        run: npm install --ignore-scripts && npm test

      - name: Test SDK Agent
        working-directory: packages/sdk-agent
        env:
          TEST_PRO_API_KEY: ${{ secrets.TEST_PRO_API_KEY }}
        run: npm install --ignore-scripts && npm test

  e2e:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install selenium webdriver-manager pytest python-dotenv requests

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Create test env file
        env:
          GATE402_EMAIL: ${{ secrets.GATE402_EMAIL }}
          GATE402_PASSWORD: ${{ secrets.GATE402_PASSWORD }}
        run: |
          mkdir -p tests/e2e
          echo "GATE402_EMAIL=${GATE402_EMAIL}" > tests/e2e/.env.test
          echo "GATE402_PASSWORD=${GATE402_PASSWORD}" >> tests/e2e/.env.test
          echo "GATE402_URL=https://www.gate402.dev" >> tests/e2e/.env.test

      - name: Run E2E tests (except logout)
        env:
          PYTHONIOENCODING: utf-8
          CI: true
        run: |
          python -m pytest tests/e2e/ \
            --ignore=tests/e2e/test_z_logout.py \
            -v -s --tb=short

      - name: Run logout test
        env:
          PYTHONIOENCODING: utf-8
          CI: true
        run: |
          python -m pytest tests/e2e/test_z_logout.py \
            -v -s --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore
