services:
  postgres:
    image: postgres:17-alpine
    container_name: gate402-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gate402
      POSTGRES_USER: gate402
      POSTGRES_PASSWORD: gate402
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gate402 -d gate402"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
